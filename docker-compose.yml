services:
  dev:
    build: .
    container_name: pix-sense-dev
    runtime: nvidia
    ports:
      - "3000:3000"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - .:/app
      - /run/udev:/run/udev:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    stdin_open: true
    tty: true
    command: bash -c "ensure-model.sh && sleep infinity"
