services:
  db:
    image: postgres:16
    container_name: pix-sense-db
    environment:
      POSTGRES_USER: pixpq
      POSTGRES_PASSWORD: not_that_secret
      POSTGRES_DB: pixpq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  prod:
    build:
      context: .
      target: prod
    container_name: pix-sense-prod
    runtime: nvidia
    restart: unless-stopped
    ports:
      - "80:3000"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - ./models:/app/models
      - /run/udev:/run/udev:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - DATABASE_URL=${DATABASE_URL:-postgres://pixpq:not_that_secret@db:5432/pixpq}
      - SCULPTURE_NAME=${SCULPTURE_NAME:-pixo-16}
    depends_on:
      - db

  dev:
    build:
      context: .
      target: dev
    container_name: pix-sense-dev
    runtime: nvidia
    ports:
      - "3000:3000"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - .:/app
      - /run/udev:/run/udev:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - DATABASE_URL=${DATABASE_URL:-postgres://pixpq:not_that_secret@db:5432/pixpq}
      - SCULPTURE_NAME=${SCULPTURE_NAME:-pixo-16}
    depends_on:
      - db
    stdin_open: true
    tty: true
    command: bash -c "ensure-model.sh && sleep infinity"

  prometheus:
    image: prom/prometheus:latest
    container_name: pix-sense-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - dev

  grafana:
    image: grafana/grafana:latest
    container_name: pix-sense-grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
